<script>
/* ==========================================================================
   🎮 POCKET FIELD ADVENTURE - FRONTEND CONTROLLER & AUDIO FX (js.html)
   Web Audio API Chiptune SFX Engine & GBC Game Router
   ========================================================================== */

const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOqoIwIamnXR7YUgh85w_478lybLsmdEd58_DJVGFDcnmhzsSQQvGXOoQTD_DTZjtGAg/exec";

// Web Audio API Retro 8-bit Sound Generator
const AudioFX = {
  ctx: null,
  muted: false,

  init() {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) this.ctx = new AudioCtx();
    } catch (e) {}
  },

  toggleSound() {
    this.muted = !this.muted;
    alert(this.muted ? '🔇 사운드 음소거 모드' : '🔊 8-bit 레트로 사운드 켜짐');
  },

  playTone(freq, type, duration, delay = 0) {
    if (this.muted) return;
    if (!this.ctx) this.init();
    if (!this.ctx) return;

    setTimeout(() => {
      try {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      } catch (e) {}
    }, delay * 1000);
  },

  playClick() {
    this.playTone(600, 'square', 0.05);
  },

  playSuccess() {
    this.playTone(523, 'square', 0.08, 0);   // C5
    this.playTone(659, 'square', 0.08, 0.08); // E5
    this.playTone(783, 'square', 0.12, 0.16); // G5
  },

  playFanfare() {
    this.playTone(523, 'triangle', 0.1, 0);
    this.playTone(659, 'triangle', 0.1, 0.1);
    this.playTone(783, 'triangle', 0.1, 0.2);
    this.playTone(1046, 'square', 0.25, 0.3);
  }
};

// Global State
const State = {
  token: localStorage.getItem('POCKET_TOKEN') || '',
  role: localStorage.getItem('POCKET_ROLE') || 'guest',
  memberId: localStorage.getItem('POCKET_MEMBER_ID') || '',
  memberName: localStorage.getItem('POCKET_MEMBER_NAME') || '',
  teamId: localStorage.getItem('POCKET_TEAM_ID') || '',
  webAppUrl: GAS_WEB_APP_URL,
  currentMission: null,
  rankingTimer: null
};

// Unified API Bridge
function apiCall(funcName, ...args) {
  return new Promise(async (resolve, reject) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(res => resolve(res))
        .withFailureHandler(err => reject(err))
        [funcName](...args);
      return;
    }

    const targetGasUrl = State.webAppUrl || GAS_WEB_APP_URL;
    if (targetGasUrl) {
      try {
        const payloadObj = args.length > 1 ? args[1] : (args[0] || {});
        const tokenVal = typeof args[0] === 'string' ? args[0] : State.token;
        const res = await fetch(targetGasUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: funcName,
            token: tokenVal,
            payload: payloadObj
          })
        });
        const json = await res.json();
        resolve(json);
        return;
      } catch (err) {
        console.error('[Fetch REST Error]', err);
      }
    }

    // Local Preview Mock Fallback
    setTimeout(() => {
      if (funcName === 'login') {
        resolve({ ok: true, data: { token: 'MOCK_TOKEN_123', role: args[0].role, memberName: '테스트 트레이너' } });
      } else if (funcName === 'getMissions') {
        resolve({
          ok: true,
          data: {
            missions: [
              { mission_id: 'Q001', title: '드레스코드 미션 (뽑기)', description: '레트로 교복 단체사진 인증', points: 20, acquire_type: 'gacha', ball_type: 'normal', status: 'open', slots: ['슬롯1', '슬롯2'] },
              { mission_id: 'Q002', title: '야생의 룰렛 미션', description: '중앙 광장 댄스 인증샷', points: 30, acquire_type: 'roulette', ball_type: 'great', status: 'open', slots: ['장소A', '장소B'] }
            ]
          }
        });
      } else if (funcName === 'getRanking') {
        resolve({
          ok: true,
          data: {
            ranking: [
              { rank: 1, team_name: '피카츄 탐험대', emblem: 'ball_normal', total_points: 120, cleared_count: 5, members: ['김피카', '이파이리'] },
              { rank: 2, team_name: '꼬북이 특공대', emblem: 'ball_great', total_points: 90, cleared_count: 3, members: ['박꼬북'] }
            ]
          }
        });
      } else {
        resolve({ ok: true, data: { message: '실행 완료' } });
      }
    }, 300);
  });
}

const Router = {
  navigate(screenId) {
    document.querySelectorAll('.view-screen').forEach(el => el.classList.add('hidden'));
    const target = document.getElementById(`screen-${screenId}`);
    if (target) target.classList.remove('hidden');

    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    
    if (screenId === 's2') App.loadMemberList();
    if (screenId === 's6') App.loadUnassignedMembers();
    if (screenId === 's7') App.loadMissions();
    if (screenId === 's9') App.loadMyBag();
    if (screenId === 's10') {
      App.loadRanking();
      App.startRankingPolling();
    } else {
      App.stopRankingPolling();
    }
    if (screenId === 's11') App.loadAdminDashboard();
  }
};

const App = {
  init() {
    AudioFX.init();
    this.updateHeaderUI();
    if (State.token) {
      if (State.role === 'admin') Router.navigate('s11');
      else Router.navigate('s7');
    } else {
      Router.navigate('s1');
    }
  },

  updateHeaderUI() {
    const levelTag = document.getElementById('hud-level-tag');
    if (State.role === 'admin') levelTag.textContent = 'OAK.PROF';
    else if (State.role === 'leader') levelTag.textContent = `LEADER:${State.memberName}`;
    else if (State.role === 'member') levelTag.textContent = 'MEMBER';
    else levelTag.textContent = 'START';
  },

  setSession(data) {
    State.token = data.token;
    State.role = data.role;
    State.memberName = data.memberName || '';
    State.memberId = data.memberId || '';
    State.teamId = data.teamId || '';

    localStorage.setItem('POCKET_TOKEN', State.token);
    localStorage.setItem('POCKET_ROLE', State.role);
    localStorage.setItem('POCKET_MEMBER_ID', State.memberId);
    localStorage.setItem('POCKET_MEMBER_NAME', State.memberName);
    localStorage.setItem('POCKET_TEAM_ID', State.teamId);

    this.updateHeaderUI();
  },

  async loadMemberList() {
    try {
      const res = await apiCall('getMemberList', State.token);
      if (res.ok && res.data) {
        const select = document.getElementById('s2-member-select');
        select.innerHTML = '<option value="">-- 본인 이름을 선택하세요 --</option>';
        (res.data.all || []).forEach(m => {
          select.innerHTML += `<option value="${m.member_id}">${m.name} (${m.class_info || '학생'})</option>`;
        });
      }
    } catch (e) { console.error(e); }
  },

  async handleLeaderLogin() {
    const memberId = document.getElementById('s2-member-select').value;
    const leaderCode = document.getElementById('s2-leader-code').value.trim();
    const password = document.getElementById('s2-password').value;

    if (!memberId || !leaderCode) return alert('이름과 팀장 코드를 입력해 주세요!');

    const res = await apiCall('login', { role: 'leader', memberId, leaderCode, password });
    if (res.ok) {
      if (res.requireSetPassword) {
        document.getElementById('modal-set-pw').classList.remove('hidden');
      } else {
        this.setSession(res.data);
        AudioFX.playFanfare();
        alert(`반갑습니다, ${res.data.memberName} 트레이너님!`);
        Router.navigate('s7');
      }
    } else alert(res.error ? res.error.message : '로그인 실패');
  },

  async handleSetInitialPassword() {
    const pw1 = document.getElementById('modal-pw-input').value;
    const pw2 = document.getElementById('modal-pw-confirm').value;
    const memberId = document.getElementById('s2-member-select').value;
    const leaderCode = document.getElementById('s2-leader-code').value.trim();

    if (!pw1 || pw1 !== pw2) return alert('비밀번호가 일치하지 않습니다.');

    const res = await apiCall('setInitialPassword', { memberId, leaderCode, password: pw1 });
    if (res.ok) {
      document.getElementById('modal-set-pw').classList.add('hidden');
      this.setSession(res.data);
      AudioFX.playFanfare();
      alert('비밀번호 설정이 완료되었습니다!');
      Router.navigate('s7');
    } else alert(res.error ? res.error.message : '비밀번호 설정 실패');
  },

  async handleMemberLogin() {
    const memberCode = document.getElementById('s3-member-code').value.trim();
    if (!memberCode) return alert('팀원 코드를 입력해 주세요.');

    const res = await apiCall('login', { role: 'member', memberCode });
    if (res.ok) {
      this.setSession(res.data);
      AudioFX.playSuccess();
      Router.navigate('s7');
    } else alert(res.error ? res.error.message : '팀원 코드 오류');
  },

  async handleAdminLogin() {
    const adminCode = document.getElementById('s4-admin-code').value.trim();
    if (!adminCode) return alert('관리자 코드를 입력해 주세요.');

    const res = await apiCall('login', { role: 'admin', adminCode });
    if (res.ok) {
      this.setSession(res.data);
      AudioFX.playFanfare();
      Router.navigate('s11');
    } else alert(res.error ? res.error.message : '관리자 코드 오류');
  },

  async loadUnassignedMembers() {
    const checklist = document.getElementById('s6-member-checklist');
    checklist.innerHTML = '명단 로딩 중...';
    const res = await apiCall('getMemberList', State.token);
    if (res.ok && res.data) {
      const list = res.data.unassigned || [];
      if (list.length === 0) {
        checklist.innerHTML = '<div style="font-size:12px;">모든 학생이 팀 배정 완료되었습니다.</div>';
        return;
      }
      checklist.innerHTML = '';
      list.forEach(m => {
        checklist.innerHTML += `
          <label style="display:flex; gap:6px; font-size:12px; margin-bottom:8px;">
            <input type="checkbox" name="team-member" value="${m.member_id}">
            <span>${m.name} (${m.class_info || '학생'})</span>
          </label>
        `;
      });
    }
  },

  async handleCreateTeam() {
    const teamName = document.getElementById('s6-team-name').value.trim();
    const checkedBoxes = document.querySelectorAll('input[name="team-member"]:checked');
    const memberIds = Array.from(checkedBoxes).map(cb => cb.value);

    if (!teamName) return alert('팀 이름을 입력해 주세요.');

    const res = await apiCall('createTeam', State.token, { teamName, emblem: 'ball_normal', memberIds });
    if (res.ok) {
      State.teamId = res.data.teamId;
      localStorage.setItem('POCKET_TEAM_ID', State.teamId);
      AudioFX.playFanfare();
      alert(res.data.message);
      Router.navigate('s7');
    } else alert(res.error ? res.error.message : '팀 결성 실패');
  },

  async loadMissions() {
    const grid = document.getElementById('s7-mission-grid');
    grid.innerHTML = '<div style="grid-column:span 2; text-align:center; padding:20px; font-size:12px;">🌿 야생 포켓볼 탐색 중...</div>';
    const res = await apiCall('getMissions', State.token);
    if (res.ok && res.data) {
      const missions = res.data.missions || [];
      grid.innerHTML = '';
      missions.forEach(m => {
        const isAcquired = !!m.my_acquired;
        const ballClass = m.ball_type || (m.acquire_type === 'roulette' ? 'great' : 'normal');
        grid.innerHTML += `
          <div class="grass-tile-card ${isAcquired ? 'got-it' : ''}" onclick="AudioFX.playClick(); App.openMissionModal('${m.mission_id}')">
            ${isAcquired ? '<div class="badge-got">GET!</div>' : ''}
            <div class="pokeball-sprite ${ballClass}"></div>
            <div style="font-weight:bold; font-size:13px; margin-top:4px;">${m.title}</div>
            <div class="text-gold" style="font-size:12px; font-weight:bold;">+${m.points} EXP</div>
          </div>
        `;
      });
      window._missionsData = missions;
    }
  },

  openMissionModal(missionId) {
    const missions = window._missionsData || [];
    const target = missions.find(m => m.mission_id === missionId);
    if (!target) return;
    State.currentMission = target;

    document.getElementById('md-title').textContent = target.title;
    document.getElementById('md-points').textContent = `🎁 성공 시 +${target.points} EXP`;
    document.getElementById('md-desc').textContent = target.description;

    const rBox = document.getElementById('md-roulette-box');
    if (target.acquire_type === 'roulette') {
      rBox.classList.remove('hidden');
      this.renderRouletteWheel(target.slots || []);
    } else rBox.classList.add('hidden');

    document.getElementById('modal-mission-detail').classList.remove('hidden');
  },

  closeMissionModal() {
    document.getElementById('modal-mission-detail').classList.add('hidden');
  },

  renderRouletteWheel(slots) {
    const wheel = document.getElementById('roulette-wheel-el');
    wheel.style.transform = 'rotate(0deg)';
    wheel.innerHTML = '';
    const sliceAngle = 360 / (slots.length || 1);
    slots.forEach((s, idx) => {
      const angle = idx * sliceAngle;
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.width = '50%';
      el.style.height = '50%';
      el.style.transformOrigin = '100% 100%';
      el.style.transform = `rotate(${angle}deg)`;
      el.style.background = idx % 2 === 0 ? '#e8a33d' : '#f8f8f0';
      el.style.border = '1px solid #202b15';
      el.style.padding = '8px';
      el.style.fontSize = '11px';
      el.textContent = s.substring(0, 6);
      wheel.appendChild(el);
    });
  },

  async executeAcquireMission() {
    if (!State.currentMission) return;
    this.closeMissionModal();

    const m = State.currentMission;

    if (m.acquire_type === 'gacha') {
      const overlay = document.getElementById('gacha-anim-overlay');
      const ball = document.getElementById('gacha-ball-el');
      const text = document.getElementById('gacha-status-text');
      
      overlay.classList.remove('hidden');
      ball.classList.add('shake-anim');
      text.textContent = '포켓볼이 꿈틀거린다...';

      const res = await apiCall('acquireMission', State.token, { missionId: m.mission_id });

      setTimeout(() => {
        document.getElementById('flash-screen-el').classList.add('active');
        AudioFX.playFanfare();
        setTimeout(() => {
          ball.classList.remove('shake-anim');
          overlay.classList.add('hidden');
          document.getElementById('flash-screen-el').classList.remove('active');

          if (res.ok) {
            alert(`🎉 포켓볼 획득 성공!\n\n획득 미션: [${res.data.slotContent}]`);
            App.loadMissions();
          } else alert(res.error ? res.error.message : '획득 실패');
        }, 300);
      }, 1200);

    } else {
      const res = await apiCall('acquireMission', State.token, { missionId: m.mission_id });
      if (res.ok) {
        AudioFX.playFanfare();
        alert(`🎉 미션 획득 성공!\n\n내용: ${res.data.slotContent}`);
        App.loadMissions();
      } else alert(res.error ? res.error.message : '획득 실패');
    }
  },

  async loadMyBag() {
    const list = document.getElementById('s9-bag-list');
    list.innerHTML = '가방 확인 중...';
    const res = await apiCall('getMyBag', State.token);
    if (res.ok && res.data) {
      document.getElementById('s9-team-title').textContent = `소속 팀: ${res.data.teamName || '미배정'}`;
      const items = res.data.items || [];
      if (items.length === 0) {
        list.innerHTML = '<div class="gb-dialog-box" style="font-size:12px;">획득한 미션이 없습니다. 풀숲에서 포켓볼을 던져보세요!</div>';
        return;
      }
      list.innerHTML = '';
      items.forEach(item => {
        const badgeBg = item.result === 'success' ? '#48a048' : (item.result === 'fail' ? '#e03838' : '#e8a33d');
        list.innerHTML += `
          <div class="gb-dialog-box">
            <div style="font-weight:bold; font-size:14px;">${item.title}</div>
            <div style="font-size:12px; margin-top:4px; color:#333;">수행 내용: ${item.slot_content}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
              <span class="text-gold" style="font-weight:bold; font-size:13px;">+${item.points} EXP</span>
              <span style="background:${badgeBg}; color:#fff; padding:2px 6px; font-size:11px; border-radius:3px; font-weight:bold;">
                ${item.result === 'success' ? 'CLEAR!' : (item.result === 'fail' ? 'FAIL' : '검토 대기')}
              </span>
            </div>
          </div>
        `;
      });
    }
  },

  async loadRanking() {
    const list = document.getElementById('s10-ranking-list');
    const res = await apiCall('getRanking', State.token);
    if (res.ok && res.data) {
      if (res.data.hidden) {
        list.innerHTML = `<div class="gb-dialog-box text-center">${res.data.message}</div>`;
        return;
      }
      document.getElementById('s10-updated-at').textContent = `실시간 순위 (${new Date().toLocaleTimeString()})`;
      const ranking = res.data.ranking || [];
      list.innerHTML = '';
      ranking.forEach(t => {
        list.innerHTML += `
          <div class="trainer-card-row ${t.rank <= 3 ? 'rank-' + t.rank : ''}">
            <div class="rank-badge-box">${t.rank}</div>
            <div class="team-meta">
              <div class="team-title">${t.team_name}</div>
              <div class="team-members-sub">트레이너: ${(t.members || []).join(', ')}</div>
            </div>
            <div class="score-display">${t.total_points} P</div>
          </div>
        `;
      });
    }
  },

  startRankingPolling() {
    this.stopRankingPolling();
    State.rankingTimer = setInterval(() => this.loadRanking(), 15000);
  },

  stopRankingPolling() {
    if (State.rankingTimer) clearInterval(State.rankingTimer);
  },

  showAdminTab(tabName) {
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.add('hidden'));
    document.getElementById(`admin-tab-${tabName}`).classList.remove('hidden');
  },

  async loadAdminDashboard() {
    const res = await apiCall('adminGetDashboard', State.token);
    if (res.ok && res.data) {
      const pending = res.data.pendingLogs || [];
      const list = document.getElementById('admin-pending-list');
      if (pending.length === 0) {
        list.innerHTML = '<div class="gb-dialog-box" style="font-size:12px;">대기 중인 판정이 없습니다.</div>';
        return;
      }
      list.innerHTML = '';
      pending.forEach(item => {
        list.innerHTML += `
          <div class="gb-dialog-box">
            <div style="font-weight:bold;">${item.team_name} - ${item.mission_title}</div>
            <div style="font-size:12px; margin-top:4px;">수행 내용: ${item.slot_content} (+${item.points} P)</div>
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button class="game-btn game-btn-green" onclick="AudioFX.playClick(); App.handleAdminJudge('${item.log_id}', 'success')">⭕ 승인</button>
              <button class="game-btn game-btn-red" onclick="AudioFX.playClick(); App.handleAdminJudge('${item.log_id}', 'fail')">❌ 실패</button>
            </div>
          </div>
        `;
      });
    }
  },

  async handleAdminJudge(logId, result) {
    const res = await apiCall('adminJudge', State.token, { logId, result });
    if (res.ok) {
      AudioFX.playSuccess();
      alert(res.data.message);
      this.loadAdminDashboard();
    }
  },

  async handleAdminAddMembers() {
    const raw = document.getElementById('adm-mem-text').value.trim();
    if (!raw) return;
    const names = raw.split('\n').map(n => ({ name: n.trim() })).filter(n => n.name);
    const res = await apiCall('adminUpsertMembers', State.token, names);
    if (res.ok) {
      AudioFX.playSuccess();
      alert(res.data.message);
      document.getElementById('adm-mem-text').value = '';
    }
  },

  async handleAdminRandomAssign() {
    if (!confirm('미배정 학생들을 기존 팀에 균등 분산 배치하시겠습니까?')) return;
    const res = await apiCall('adminRandomAssign', State.token, {});
    if (res.ok) {
      AudioFX.playSuccess();
      alert(res.data.message);
    }
  },

  async handleAdminSetPhase(phase) {
    const res = await apiCall('adminUpdateConfig', State.token, { event_phase: phase });
    if (res.ok) alert(`행사 단계가 [${phase}]로 전환되었습니다!`);
  },

  async handleAdminPurgeData() {
    if (!confirm('⚠ 정말로 행사 종료 후 개인정보를 파기하시겠습니까?')) return;
    const res = await apiCall('adminPurgeData', State.token);
    if (res.ok) alert(res.data.message);
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
