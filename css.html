<style>
/* ==========================================================================
   🎮 POCKET FIELD ADVENTURE - GBC RETRO DESIGN SYSTEM (css.html)
   GameBoy Color (GBC) Pokemon Gold Homage Theme
   ========================================================================== */

@import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.woff');

@font-face {
  font-family: 'NeoDunggeunmo';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/NeoDunggeunmo.woff') format('woff');
  font-weight: normal;
  font-style: normal;
}

:root {
  /* GBC Palette Tokens */
  --gb-darkest: #1F1F1F;
  --gb-dark: #55555E;
  --gb-light: #C5C7A6;
  --gb-lightest: #F5F3DE;
  
  /* Accent Colors */
  --gold-accent: #E8A33D;
  --ball-red: #D84B3E;
  --hp-green: #58A458;
  --great-blue: #3E82D8;
  --ultra-yellow: #F4C430;
  --master-purple: #8B44A8;

  /* Typography */
  --font-pixel: 'NeoDunggeunmo', 'Courier New', monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-color: var(--gb-darkest);
  color: var(--gb-darkest);
  font-family: var(--font-pixel);
  font-size: 16px;
  line-height: 1.4;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ==========================================================================
   📱 Mobile-First GBC Screen Frame
   ========================================================================== */

#app-viewport {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  max-height: 900px;
  background-color: var(--gb-light);
  border: 4px solid var(--gb-darkest);
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.2);
  overflow: hidden;
}

@media (min-width: 450px) {
  #app-viewport {
    height: 860px;
    border-radius: 12px;
    margin: 20px auto;
  }
}

/* Header Bar */
header.gb-header {
  background-color: var(--gb-darkest);
  color: var(--gb-lightest);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 4px solid var(--gold-accent);
  font-size: 14px;
  z-index: 10;
}

header.gb-header .logo-title {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--gold-accent);
  font-weight: bold;
}

header.gb-header .user-badge {
  background-color: var(--gb-dark);
  color: var(--gb-lightest);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}

/* Main Screen Scroll Area */
main.gb-main {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
}

/* Bottom Nav Bar */
nav.gb-navbar {
  background-color: var(--gb-darkest);
  border-top: 4px solid var(--gb-dark);
  display: flex;
  justify-content: space-around;
  padding: 6px 0;
  z-index: 10;
}

.nav-item {
  background: none;
  border: none;
  color: var(--gb-light);
  font-family: var(--font-pixel);
  font-size: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 12px;
  cursor: pointer;
}

.nav-item.active {
  color: var(--gold-accent);
  font-weight: bold;
}

.nav-item .nav-icon {
  font-size: 18px;
}

/* ==========================================================================
   💬 GBC Dialog Box & Pixel Borders
   ========================================================================== */

.gb-box {
  background-color: var(--gb-lightest);
  border: 4px solid var(--gb-darkest);
  box-shadow: inset -2px -2px 0px var(--gb-dark), inset 2px 2px 0px #FFF;
  padding: 12px;
  position: relative;
}

.gb-dialog {
  background-color: var(--gb-lightest);
  border: 4px solid var(--gb-darkest);
  outline: 2px solid var(--gb-lightest);
  box-shadow: inset -3px -3px 0px #BBB, inset 3px 3px 0px #FFF;
  padding: 12px 14px;
  position: relative;
  min-height: 70px;
}

.gb-dialog::after {
  content: '▼';
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-size: 12px;
  color: var(--gb-darkest);
  animation: dialog-blink 0.8s infinite;
}

@keyframes dialog-blink {
  0%, 100% { opacity: 1; transform: translateY(0); }
  50% { opacity: 0; transform: translateY(2px); }
}

/* ==========================================================================
   🔘 Pixel Buttons
   ========================================================================== */

.gb-btn {
  font-family: var(--font-pixel);
  font-size: 16px;
  padding: 10px 16px;
  min-height: 44px;
  background-color: var(--gb-lightest);
  color: var(--gb-darkest);
  border: 4px solid var(--gb-darkest);
  box-shadow: inset -3px -3px 0px var(--gb-dark), inset 3px 3px 0px #FFF;
  cursor: pointer;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  text-align: center;
  transition: transform 0.05s ease;
}

.gb-btn:active {
  transform: translate(2px, 2px);
  box-shadow: inset 2px 2px 0px var(--gb-dark);
}

.gb-btn-primary {
  background-color: var(--gold-accent);
  color: var(--gb-darkest);
  font-weight: bold;
}

.gb-btn-danger {
  background-color: var(--ball-red);
  color: #FFF;
}

.gb-btn-success {
  background-color: var(--hp-green);
  color: #FFF;
}

.gb-btn-block {
  width: 100%;
}

/* Inputs */
.gb-input {
  font-family: var(--font-pixel);
  font-size: 15px;
  padding: 10px;
  width: 100%;
  border: 3px solid var(--gb-darkest);
  background-color: var(--gb-lightest);
  color: var(--gb-darkest);
  outline: none;
}

.gb-input:focus {
  background-color: #FFF;
  border-color: var(--gold-accent);
}

/* ==========================================================================
   🏆 Trainer Card & Ranking List
   ========================================================================== */

.trainer-card {
  background-color: var(--gb-lightest);
  border: 4px solid var(--gb-darkest);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

.trainer-card.top1 {
  border-color: var(--gold-accent);
  background: linear-gradient(135deg, var(--gb-lightest) 80%, #FFEBAA 100%);
}

.trainer-card .rank-badge {
  width: 36px;
  height: 36px;
  background-color: var(--gb-darkest);
  color: var(--gold-accent);
  font-size: 18px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--gold-accent);
}

.trainer-card .team-info {
  flex: 1;
}

.trainer-card .team-name {
  font-size: 16px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 6px;
}

.trainer-card .team-members {
  font-size: 12px;
  color: var(--gb-dark);
}

.trainer-card .exp-points {
  font-size: 18px;
  font-weight: bold;
  color: var(--ball-red);
}

/* ==========================================================================
   🔴 Field Grass Grid & Pokeball Cards
   ========================================================================== */

.grass-grid {
  background-color: #A3AF83;
  border: 4px solid var(--gb-darkest);
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  background-image: radial-gradient(var(--gb-dark) 15%, transparent 16%);
  background-size: 16px 16px;
}

.mission-ball-card {
  background-color: var(--gb-lightest);
  border: 3px solid var(--gb-darkest);
  padding: 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  position: relative;
}

.mission-ball-card.acquired {
  background-color: #E2E4CD;
  border-color: var(--hp-green);
}

.mission-ball-card .ball-icon {
  font-size: 36px;
  animation: ball-shake 2s infinite ease-in-out;
}

.mission-ball-card.closed .ball-icon {
  filter: grayscale(100%);
  animation: none;
}

@keyframes ball-shake {
  0%, 80%, 100% { transform: rotate(0deg); }
  85% { transform: rotate(-10deg); }
  90% { transform: rotate(10deg); }
  95% { transform: rotate(-5deg); }
}

.get-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  background-color: var(--hp-green);
  color: #FFF;
  font-size: 10px;
  padding: 2px 4px;
  border: 1px solid var(--gb-darkest);
}

/* ==========================================================================
   ✨ Gacha Pokeball Open Sequence Animation
   ========================================================================== */

.gacha-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(31,31,31,0.9);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  padding: 20px;
}

.gacha-ball {
  width: 120px;
  height: 120px;
  background: linear-gradient(to bottom, var(--ball-red) 48%, var(--gb-darkest) 48%, var(--gb-darkest) 52%, #FFF 52%);
  border: 6px solid var(--gb-darkest);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4);
}

.gacha-ball::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  background: #FFF;
  border: 5px solid var(--gb-darkest);
  border-radius: 50%;
  box-shadow: inset 0 0 0 2px #DDD;
}

.gacha-ball.opening {
  animation: gacha-shake-open 1.2s forwards;
}

@keyframes gacha-shake-open {
  0% { transform: scale(1) rotate(0deg); }
  20% { transform: scale(1.1) rotate(-15deg); }
  40% { transform: scale(1.1) rotate(15deg); }
  60% { transform: scale(1.2) rotate(-20deg); }
  80% { transform: scale(1.3) rotate(20deg); filter: brightness(1.5); }
  100% { transform: scale(1.5); filter: brightness(3); opacity: 0; }
}

/* Flash effect */
.flash-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #FFF;
  z-index: 101;
  opacity: 0;
  pointer-events: none;
}
.flash-screen.flash {
  animation: flash-anim 0.5s ease-out;
}
@keyframes flash-anim {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* ==========================================================================
   🎰 Roulette Wheel Animation
   ========================================================================== */

.roulette-container {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 6px solid var(--gb-darkest);
  position: relative;
  overflow: hidden;
  margin: 10px auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  background-color: var(--gold-accent);
}

.roulette-wheel {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 3s cubic-bezier(0.15, 0.9, 0.2, 1);
}

.roulette-pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid var(--ball-red);
  z-index: 20;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
}

/* ==========================================================================
   ⚙ Helper Utilities
   ========================================================================== */

.hidden { display: none !important; }
.text-center { text-align: center; }
.text-small { font-size: 13px; color: var(--gb-dark); }
.text-gold { color: var(--gold-accent); }
.mt-10 { margin-top: 10px; }
.mt-14 { margin-top: 14px; }
.mb-10 { margin-bottom: 10px; }
.flex-column { display: flex; flex-direction: column; gap: 10px; }
.flex-row { display: flex; gap: 10px; align-items: center; }

/* Loading Spinner */
.pokeball-spinner {
  width: 40px; height: 40px;
  background: linear-gradient(to bottom, var(--ball-red) 48%, var(--gb-darkest) 48%, var(--gb-darkest) 52%, #FFF 52%);
  border: 3px solid var(--gb-darkest);
  border-radius: 50%;
  animation: spin 1s infinite linear;
  margin: 20px auto;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
